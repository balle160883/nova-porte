version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pro-mobile-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cobranza_pro_pass_2026}
      POSTGRES_DB: ${DB_NAME:-cobranza_pro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cobranza_pro}"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    restart: always
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-cobranza_pro_pass_2026}@db:5432/${DB_NAME:-cobranza_pro}?schema=public
      - JWT_SECRET=${JWT_SECRET:-cobranza-pro-secret-2026}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://2.24.81.205:4000}
        - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN:-pk.eyJ1IjoiZGpiYjE2MDg4MyIsImEiOiJjbW4zY2o0dTUwOGdxMnFxNTAxZnJocjJvIn0.Yv7408j9tAieaX-YB-vAwg}
    ports:
      - "3080:3000"
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
